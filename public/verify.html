<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — EventPulse</title>
  <link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="css/auth.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>
<body class="auth-body">
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <div class="brand-icon"><svg class="logo-svg" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor"/></svg></div>
        EventPulse
      </a>
    </div>
  </nav>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
    <div class="auth-card" style="max-width:420px;width:100%;text-align:center;padding:3rem 2.5rem;">
      <div id="verify-loading">
        <div class="spinner" style="margin:0 auto 1.5rem;"></div>
        <h2 style="font-family:'Outfit',sans-serif;">Verifying your email…</h2>
        <p style="color:#64748b;">Please wait a moment.</p>
      </div>
      <div id="verify-success" style="display:none;">
        <div class="success-icon" style="margin:0 auto 1.5rem;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="40" height="40"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <h2 style="font-family:'Outfit',sans-serif;margin-bottom:.5rem;">Email Verified!</h2>
        <p style="color:#64748b;margin-bottom:2rem;">Your account is now active. You can sign in.</p>
        <a href="auth.html" class="auth-submit-btn" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;">Sign In Now</a>
      </div>
      <div id="verify-error" style="display:none;">
        <div style="width:72px;height:72px;border-radius:50%;background:rgba(239,68,68,.12);border:2px solid rgba(239,68,68,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;color:#f87171;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="36" height="36"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </div>
        <h2 style="font-family:'Outfit',sans-serif;margin-bottom:.5rem;">Link Invalid</h2>
        <p id="verify-error-msg" style="color:#64748b;margin-bottom:2rem;">This verification link is invalid or has already been used.</p>
        <a href="auth.html" class="auth-submit-btn" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;">Back to Sign In</a>
      </div>
    </div>
  </div>
  <script>
    (async () => {
      const token = new URLSearchParams(location.search).get('token');
      if (!token) { show('error', 'No verification token found.'); return; }
      try {
        const res = await fetch(`/api/auth/verify?token=${token}`);
        const d   = await res.json();
        if (d.success) show('success'); else show('error', d.message);
      } catch { show('error', 'Server error. Make sure the backend is running.'); }
      function show(type, msg) {
        document.getElementById('verify-loading').style.display = 'none';
        if (type === 'success') { document.getElementById('verify-success').style.display = 'block'; }
        else { document.getElementById('verify-error').style.display = 'block'; if(msg) document.getElementById('verify-error-msg').textContent = msg; }
      }
    })();
  </script>
</body>
</html>
