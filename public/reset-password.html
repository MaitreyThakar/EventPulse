<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — EventPulse</title>
  <link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="css/auth.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>
<body class="auth-body">
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <div class="brand-icon"><svg class="logo-svg" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor"/></svg></div>
        EventPulse
      </a>
    </div>
  </nav>

  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
    <div class="auth-card" style="max-width:420px;width:100%;">
      <div style="text-align:center;margin-bottom:2rem;">
        <div style="width:60px;height:60px;border-radius:50%;background:rgba(99,102,241,.12);border:2px solid rgba(99,102,241,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;color:#818cf8;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h1 class="auth-form-title">Set New Password</h1>
        <p class="auth-form-subtitle">Enter your new password below</p>
      </div>

      <form id="reset-form" novalidate>
        <div class="auth-form-group">
          <label class="auth-label" for="new-password">New Password</label>
          <div class="auth-input-wrap">
            <input type="password" id="new-password" class="auth-input" placeholder="Min. 6 characters" required />
            <button type="button" class="toggle-password" data-target="new-password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="password-strength" id="pw-strength" style="display:none;">
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <span class="strength-label" id="strength-label"></span>
          </div>
        </div>
        <div class="auth-form-group">
          <label class="auth-label" for="confirm-password">Confirm Password</label>
          <div class="auth-input-wrap">
            <input type="password" id="confirm-password" class="auth-input" placeholder="Re-enter password" required />
          </div>
        </div>
        <div class="auth-error" id="reset-error" style="display:none;"></div>
        <button type="submit" class="auth-submit-btn" id="reset-btn">
          <span class="auth-btn-text">Reset Password</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>

      <div id="reset-success" style="display:none;text-align:center;">
        <div class="success-icon" style="margin:0 auto 1.25rem;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="40" height="40"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <h3 style="font-family:'Outfit',sans-serif;margin-bottom:.5rem;">Password Reset!</h3>
        <p style="color:#64748b;margin-bottom:1.5rem;">You can now sign in with your new password.</p>
        <a href="auth.html" class="auth-submit-btn" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;">Sign In</a>
      </div>
    </div>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) { document.getElementById('reset-error').textContent='Invalid reset link.'; document.getElementById('reset-error').style.display='flex'; }

    // Password strength
    const pwInput = document.getElementById('new-password');
    const strengthDiv = document.getElementById('pw-strength');
    const sFill = document.getElementById('strength-fill');
    const sLabel = document.getElementById('strength-label');
    pwInput.addEventListener('input', () => {
      const v = pwInput.value;
      if (!v) { strengthDiv.style.display='none'; return; }
      strengthDiv.style.display = 'flex';
      let score = 0;
      if(v.length>=6)score++; if(v.length>=10)score++; if(/[A-Z]/.test(v))score++; if(/[0-9]/.test(v))score++; if(/[^A-Za-z0-9]/.test(v))score++;
      sFill.className = 'strength-fill'; sLabel.className = 'strength-label';
      const cls = score<=2?'weak':score<=3?'medium':'strong';
      const txt = score<=2?'Weak':score<=3?'Fair':'Strong';
      sFill.classList.add(cls); sLabel.classList.add(cls); sLabel.textContent=txt;
    });

    // Show/hide password
    document.querySelector('.toggle-password').addEventListener('click', () => {
      pwInput.type = pwInput.type==='password'?'text':'password';
    });

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('reset-error');
      const btn   = document.getElementById('reset-btn');
      const pw    = pwInput.value;
      const conf  = document.getElementById('confirm-password').value;
      errEl.style.display='none';
      if(pw.length<6){errEl.textContent='Password must be at least 6 characters.';errEl.style.display='flex';return;}
      if(pw!==conf){errEl.textContent='Passwords do not match.';errEl.style.display='flex';return;}
      btn.disabled=true; btn.querySelector('.auth-btn-text').textContent='Resetting…';
      try {
        const res = await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password:pw})});
        const d = await res.json();
        if(d.success){ document.getElementById('reset-form').style.display='none'; document.getElementById('reset-success').style.display='block'; }
        else { errEl.textContent=d.message||'Reset failed.'; errEl.style.display='flex'; }
      } catch { errEl.textContent='Server error.'; errEl.style.display='flex'; }
      finally { btn.disabled=false; btn.querySelector('.auth-btn-text').textContent='Reset Password'; }
    });
  </script>
</body>
</html>
